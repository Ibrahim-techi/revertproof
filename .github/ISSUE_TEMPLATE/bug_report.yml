name: Bug report
description: Report incorrect rollback-readiness behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the command, refs, configuration, and relevant report output.
      placeholder: |
        node dist/cli.js check --base main --head feature
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What result did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Git version, and RevertProof version or commit.
    validations:
      required: true
