name: Feature request
description: Suggest an improvement that fits RevertProof's rollback-readiness scope.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer workflow or rollback-readiness gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Primary surface
      options:
        - GitHub Action
        - CLI
        - Report output
        - Configuration
        - Documentation
    validations:
      required: true
